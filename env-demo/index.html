<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>变量 Demo</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #444;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    button {
      padding: 10px 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f7f7f7;
      cursor: pointer;
    }

    button:hover {
      background: #ececec;
    }

    pre {
      min-height: 140px;
      padding: 16px;
      border-radius: 10px;
      background: #111827;
      color: #e5e7eb;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>Cloudflare Pages 变量和密钥 Demo</h1>
  <p>
    先在 Pages 后台配置两个值：
    <code>SITE_NAME</code> 用“文本”，
    <code>MY_TOKEN</code> 用“密钥”。
  </p>

  <div class="actions">
    <button id="site-btn">读取文本变量</button>
    <button id="token-btn">测试密钥校验</button>
    <button id="bad-token-btn">测试错误密钥</button>
  </div>

  <pre id="result">点击上面的按钮查看结果</pre>

  <script>
    const result = document.getElementById("result");

    document.getElementById("site-btn").addEventListener("click", async () => {
      const res = await fetch("/api/site");
      const data = await res.json();
      result.textContent = JSON.stringify(data, null, 2);
    });

    document.getElementById("token-btn").addEventListener("click", async () => {
      const res = await fetch("/api/check", {
        headers: {
          "x-token": "abc123456"
        }
      });
      result.textContent = await res.text();
    });

    document.getElementById("bad-token-btn").addEventListener("click", async () => {
      const res = await fetch("/api/check", {
        headers: {
          "x-token": "wrong-token"
        }
      });
      result.textContent = `${res.status} ${await res.text()}`;
    });
  </script>
</body>
</html>
